<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVGen - Starting...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      overflow: hidden;
    }

    .splash-container {
      text-align: center;
      z-index: 10;
      animation: fadeIn 0.8s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Animated quantum logo */
    .quantum-logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 40px;
      position: relative;
      display: inline-block;
    }

    .quantum-orbit {
      width: 100%;
      height: 100%;
      border: 3px solid rgba(0, 200, 255, 0.3);
      border-radius: 50%;
      position: absolute;
      animation: orbit 8s linear infinite;
    }

    .quantum-orbit:nth-child(1) {
      width: 100%;
      height: 100%;
      animation-delay: 0s;
    }

    .quantum-orbit:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      animation-direction: reverse;
      animation-delay: -2s;
    }

    .quantum-orbit:nth-child(3) {
      width: 40%;
      height: 40%;
      top: 30%;
      left: 30%;
      animation-delay: -4s;
    }

    @keyframes orbit {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    .quantum-core {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #00c8ff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        box-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
      }
      50% {
        box-shadow: 0 0 40px rgba(0, 200, 255, 1);
      }
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #00c8ff 0%, #0080ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 20px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 60px;
      letter-spacing: 0.5px;
    }

    /* Loading bar */
    .progress-container {
      width: 300px;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      margin: 0 auto 30px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 200, 255, 0.2);
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #00c8ff, #0080ff);
      border-radius: 3px;
      animation: loading 2.5s ease-in-out infinite;
      box-shadow: 0 0 10px rgba(0, 200, 255, 0.8);
    }

    @keyframes loading {
      0% {
        width: 0%;
      }
      50% {
        width: 100%;
      }
      100% {
        width: 100%;
      }
    }

    /* Status text */
    .status-text {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      height: 24px;
      margin-bottom: 20px;
      min-height: 24px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #00c8ff;
      border-radius: 50%;
      margin-right: 8px;
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.3;
      }
    }

    /* Version info */
    .version-info {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 40px;
      font-family: 'Monaco', 'Menlo', monospace;
    }

    /* Background animation */
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.5;
    }

    .bg-particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 200, 255, 0.5);
      border-radius: 50%;
      animation: float linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) translateX(100px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="background-animation" id="bgAnimation"></div>

  <div class="splash-container">
    <div class="quantum-logo">
      <div class="quantum-orbit"></div>
      <div class="quantum-orbit"></div>
      <div class="quantum-orbit"></div>
      <div class="quantum-core"></div>
    </div>

    <h1>CVGen</h1>
    <p class="subtitle">Quantum Computing for Every Device</p>

    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>

    <div class="status-text">
      <span class="status-dot"></span><span id="statusMessage">Starting quantum backend...</span>
    </div>

    <div class="version-info" id="versionInfo"></div>
  </div>

  <script>
    const statusMessages = [
      'Starting quantum backend...',
      'Initializing AI agents...',
      'Loading quantum circuits...',
      'Preparing compute infrastructure...',
      'Ready!'
    ];

    let messageIndex = 0;
    const statusElement = document.getElementById('statusMessage');

    // Rotate status messages
    setInterval(() => {
      if (messageIndex < statusMessages.length - 1) {
        messageIndex = (messageIndex + 1) % statusMessages.length;
        statusElement.textContent = statusMessages[messageIndex];
      }
    }, 2000);

    // Generate random background particles
    function generateParticles() {
      const bg = document.getElementById('bgAnimation');
      const particleCount = 30;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'bg-particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
        particle.style.animationDelay = (Math.random() * 2) + 's';
        bg.appendChild(particle);
      }
    }

    generateParticles();

    // Try to load version info
    try {
      if (window.cvgen && window.cvgen.getVersion) {
        window.cvgen.getVersion().then((version) => {
          document.getElementById('versionInfo').textContent = `v${version}`;
        });
      }
    } catch (e) {
      // Ignore if API not available
    }
  </script>
</body>
</html>
