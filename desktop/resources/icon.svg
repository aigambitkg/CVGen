<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
    <style>
      @keyframes orbit {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </defs>

  <!-- Outer circle background -->
  <circle cx="128" cy="128" r="128" fill="#1a1a2e"/>

  <!-- Gradient ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>

  <!-- First orbit -->
  <circle cx="128" cy="128" r="90" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>

  <!-- Second orbit -->
  <circle cx="128" cy="128" r="60" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.7"/>

  <!-- Inner core -->
  <circle cx="128" cy="128" r="30" fill="none" stroke="url(#grad1)" stroke-width="3" opacity="0.9"/>

  <!-- Central node -->
  <circle cx="128" cy="128" r="12" fill="url(#grad1)"/>

  <!-- Outer nodes -->
  <circle cx="128" cy="48" r="8" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="208" cy="128" r="8" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="128" cy="208" r="8" fill="url(#grad1)" opacity="0.8"/>
  <circle cx="48" cy="128" r="8" fill="url(#grad1)" opacity="0.8"/>

  <!-- Diagonal nodes -->
  <circle cx="173" cy="83" r="6" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="173" cy="173" r="6" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="83" cy="173" r="6" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="83" cy="83" r="6" fill="url(#grad1)" opacity="0.6"/>

  <!-- Connecting lines -->
  <line x1="128" y1="48" x2="128" y2="128" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  <line x1="208" y1="128" x2="128" y2="128" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  <line x1="128" y1="208" x2="128" y2="128" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>
  <line x1="48" y1="128" x2="128" y2="128" stroke="url(#grad1)" stroke-width="1.5" opacity="0.4"/>

  <!-- Glow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="12" fill="url(#grad1)" filter="url(#glow)" opacity="0.9"/>
</svg>
